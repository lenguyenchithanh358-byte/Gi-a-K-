<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng Điều Khiển - Hệ Thống Quản Lý Sinh Viên</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-left">
        <h1>Quản Lý Sinh Viên</h1>
        <p>Xin chào, <span id="user-fullname" class="highlight">Người dùng</span></p>
      </div>
      <div class="header-right">
        <button id="logout-btn" class="btn btn-danger">Đăng Xuất</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="dashboard-content">
      <!-- Search & Add Actions -->
      <div class="action-bar">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Tìm kiếm sinh viên theo tên, mã số, ngành học...">
          <button id="search-btn" class="btn btn-secondary">Tìm kiếm</button>
        </div>
        <button id="open-add-modal-btn" class="btn btn-success">+ Thêm Sinh Viên</button>
      </div>

      <!-- Alert Box -->
      <div id="dashboard-alert" class="alert hidden"></div>

      <!-- Table Container -->
      <div class="table-container">
        <table class="student-table">
          <thead>
            <tr>
              <th>Mã SV</th>
              <th>Họ và Tên</th>
              <th>Email</th>
              <th>Ngành Học</th>
              <th>Điểm GPA</th>
              <th style="width: 150px;">Thao Tác</th>
            </tr>
          </thead>
          <tbody id="student-list-body">
            <!-- Student rows will be generated by JavaScript -->
            <tr>
              <td colspan="6" class="text-center">Đang tải dữ liệu...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add/Edit Modal (Dialog) -->
  <div id="student-modal" class="modal-backdrop hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-title">Thêm Sinh Viên Mới</h3>
        <button id="close-modal-btn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <form id="student-form">
          <input type="hidden" id="student-id">
          
          <div class="form-group">
            <label for="student-code">Mã Số Sinh Viên (MSSV) <span class="required">*</span></label>
            <input type="text" id="student-code" required placeholder="Ví dụ: SV001">
          </div>
          
          <div class="form-group">
            <label for="fullname">Họ và Tên <span class="required">*</span></label>
            <input type="text" id="fullname" required placeholder="Ví dụ: Nguyễn Văn A">
          </div>
          
          <div class="form-group">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" required placeholder="Ví dụ: anguyen@gmail.com">
          </div>
          
          <div class="form-group">
            <label for="major">Ngành Học <span class="required">*</span></label>
            <input type="text" id="major" required placeholder="Ví dụ: Công nghệ thông tin">
          </div>
          
          <div class="form-group">
            <label for="gpa">Điểm GPA</label>
            <input type="number" id="gpa" step="0.1" min="0" max="4" value="0" placeholder="Thang điểm 4.0 (Ví dụ: 3.5)">
          </div>

          <div class="modal-actions">
            <button type="button" id="cancel-modal-btn" class="btn btn-secondary">Hủy</button>
            <button type="submit" id="save-student-btn" class="btn btn-primary">Lưu Lại</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

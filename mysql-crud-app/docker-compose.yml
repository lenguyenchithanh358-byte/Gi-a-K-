version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: student_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: student_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql

  adminer:
    image: adminer
    container_name: student_adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  db_data:
